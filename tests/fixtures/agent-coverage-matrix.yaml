# Critical Gaps Identified
critical_gaps:
  - role: "security-engineer"
    severity: critical
    reason: "No dedicated OWASP/STRIDE security engineer"
    partial_coverage_from: "testing-api-tester (minimal)"
    recommendation: "Create engineering-security-engineer agent"
    
  - role: "data-scientist"
    severity: important
    reason: "No formal statistical modeling agent"
    partial_coverage_from: "engineering-ai-engineer (limited)"
    recommendation: "Enhance data-analytics-reporter or create new agent"
    
  - role: "chaos-engineer"
    severity: important
    reason: "No chaos engineering expertise"
    partial_coverage_from: "None"
    recommendation: "Consider expanding support-infrastructure-maintainer scope"
    
  - role: "observability-engineer"
    severity: important
    reason: "No OpenTelemetry/tracing specialist"
    partial_coverage_from: "support-infrastructure-maintainer (limited)"
    recommendation: "Enhance infrastructure agent capabilities"
    
  - role: "ai-ethics-reviewer"
    severity: nice-to-have
    reason: "No bias/fairness specialist"
    partial_coverage_from: "None"
    recommendation: "Optional for AI-heavy projects only"
    
  - role: "penetration-tester"
    severity: nice-to-have
    reason: "No offensive security capability"
    partial_coverage_from: "None"
    recommendation: "Optional - covered by security reviews"

