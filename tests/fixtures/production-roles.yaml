# Production-Grade Role Definitions
# Defines production-grade roles for gap analysis against Legion roster
# Version: 1.0.0
# Requirements: ROSTER-01, ROSTER-02, ROSTER-03, ROSTER-04, ROSTER-05, ROSTER-06

metadata:
  version: "1.0.0"
  source_references:
    - "Google SRE Book - Site Reliability Engineering"
    - "OWASP Testing Guide v4.2"
    - "STRIDE Threat Model - Microsoft SDL"
    - "ISO/IEC 27001 - Information Security Management"
    - "AWS Well-Architected Framework"
    - "The Data Engineering Handbook"
  last_updated: "2026-03-05"
  total_roles: 18

# SRE/DevOps Roles
roles:
  sre-reliability-engineer:
    name: "SRE Reliability Engineer"
    category: "sre-devops"
    priority: critical
    required_capabilities:
      - "Service Level Objective (SLO) definition and monitoring"
      - "Error budget management and policy enforcement"
      - "Incident response and post-mortem facilitation"
      - "Capacity planning and performance optimization"
      - "Blameless culture advocacy"
    coverage_indicators:
      - agent_name_patterns: ["sre", "reliability", "infrastructure", "ops"]
      - task_type_overlaps: ["incident-response", "monitoring", "performance"]
      - skill_keywords: ["slo", "error-budget", "observability", "on-call"]
    related_divisions:
      - "Support"
      - "Engineering"
    gap_severity_if_missing: critical

  chaos-engineer:
    name: "Chaos Engineer"
    category: "sre-devops"
    priority: important
    required_capabilities:
      - "Failure injection and chaos testing design"
      - "Resilience validation and blast radius containment"
      - "Game day coordination and execution"
      - "System stress testing and degradation modeling"
      - "Chaos engineering tool expertise (Chaos Monkey, Gremlin)"
    coverage_indicators:
      - agent_name_patterns: ["chaos", "resilience", "testing"]
      - task_type_overlaps: ["chaos-testing", "failure-injection"]
      - skill_keywords: ["game-day", "blast-radius", "failure-mode"]
    related_divisions:
      - "Testing"
      - "Engineering"
    gap_severity_if_missing: important

  platform-engineer:
    name: "Platform Engineer"
    category: "sre-devops"
    priority: important
    required_capabilities:
      - "Internal developer platform (IDP) design and maintenance"
      - "Self-service infrastructure provisioning"
      - "Golden path definition and enforcement"
      - "Developer experience optimization"
      - "Platform-as-a-Product mindset"
    coverage_indicators:
      - agent_name_patterns: ["platform", "devops", "infrastructure"]
      - task_type_overlaps: ["platform", "developer-experience", "tooling"]
      - skill_keywords: ["idp", "golden-path", "self-service"]
    related_divisions:
      - "Engineering"
      - "Support"
    gap_severity_if_missing: important

  observability-engineer:
    name: "Observability Engineer"
    category: "sre-devops"
    priority: important
    required_capabilities:
      - "Distributed tracing implementation and analysis"
      - "Metrics pipeline design and optimization"
      - "Log aggregation and analysis at scale"
      - "Alert design and noise reduction"
      - "OpenTelemetry or vendor-specific tooling expertise"
    coverage_indicators:
      - agent_name_patterns: ["observability", "monitoring", "analytics"]
      - task_type_overlaps: ["monitoring", "logging", "tracing"]
      - skill_keywords: ["opentelemetry", "metrics", "alerts", "dashboards"]
    related_divisions:
      - "Support"
      - "Data"
    gap_severity_if_missing: important

# Security Roles
  security-engineer:
    name: "Security Engineer"
    category: "security"
    priority: critical
    required_capabilities:
      - "OWASP Top 10 vulnerability assessment and remediation"
      - "STRIDE threat modeling and security architecture review"
      - "Secure coding practice education and enforcement"
      - "Security tool integration (SAST/DAST)"
      - "Incident response for security breaches"
    coverage_indicators:
      - agent_name_patterns: ["security", "appsec", "secure"]
      - task_type_overlaps: ["security-audit", "vulnerability-assessment"]
      - skill_keywords: ["owasp", "stride", "sast", "dast", "penetration"]
    related_divisions:
      - "Engineering"
      - "Testing"
    gap_severity_if_missing: critical

  compliance-auditor:
    name: "Compliance Auditor"
    category: "security"
    priority: critical
    required_capabilities:
      - "Regulatory compliance assessment (GDPR, HIPAA, SOC2)"
      - "Policy documentation and enforcement"
      - "Audit trail maintenance and evidence collection"
      - "Risk assessment and mitigation planning"
      - "Third-party vendor security assessment"
    coverage_indicators:
      - agent_name_patterns: ["compliance", "legal", "audit"]
      - task_type_overlaps: ["compliance", "audit", "risk-assessment"]
      - skill_keywords: ["gdpr", "soc2", "hipaa", "audit-trail"]
    related_divisions:
      - "Support"
    gap_severity_if_missing: critical

  penetration-tester:
    name: "Penetration Tester"
    category: "security"
    priority: nice-to-have
    required_capabilities:
      - "Authorized offensive security testing"
      - "Vulnerability exploitation and proof-of-concept"
      - "Social engineering simulation"
      - "Physical security assessment"
      - "Red team exercise participation"
    coverage_indicators:
      - agent_name_patterns: ["penetration", "pentest", "red-team"]
      - task_type_overlaps: ["penetration-testing", "red-team"]
      - skill_keywords: ["exploitation", "vulnerability", "offensive"]
    related_divisions:
      - "Testing"
      - "Engineering"
    gap_severity_if_missing: nice-to-have
    note: "Optional for most projects; critical for high-security environments"

  pii-specialist:
    name: "PII/Data Privacy Specialist"
    category: "security"
    priority: important
    required_capabilities:
      - "Personally Identifiable Information (PII) identification and classification"
      - "Data masking and anonymization techniques"
      - "Privacy by design implementation"
      - "Data retention policy enforcement"
      - "Subject access request (SAR) fulfillment"
    coverage_indicators:
      - agent_name_patterns: ["privacy", "pii", "data-protection"]
      - task_type_overlaps: ["privacy", "data-protection", "gdpr"]
      - skill_keywords: ["pii", "anonymization", "data-masking", "retention"]
    related_divisions:
      - "Support"
      - "Data"
    gap_severity_if_missing: important

