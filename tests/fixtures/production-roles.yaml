    coverage_indicators:
      - agent_name_patterns: ["data-engineer", "etl", "pipeline"]
      - task_type_overlaps: ["data-engineering", "etl", "pipelines"]
      - skill_keywords: ["etl", "elt", "kafka", "spark", "data-warehouse"]
    related_divisions:
      - "Data"
      - "Engineering"
    gap_severity_if_missing: important

  ai-ethics-reviewer:
    name: "AI Ethics Reviewer"
    category: "data-ai"
    priority: nice-to-have
    required_capabilities:
      - "Algorithmic bias detection and mitigation"
      - "Fairness metrics and demographic parity assessment"
      - "Explainability and interpretability review"
      - "AI impact assessment and stakeholder consultation"
      - "Responsible AI guideline development"
    coverage_indicators:
      - agent_name_patterns: ["ethics", "ai-ethics", "fairness"]
      - task_type_overlaps: ["ethics-review", "bias-audit"]
      - skill_keywords: ["bias", "fairness", "explainability", "responsible-ai"]
    related_divisions:
      - "Data"
      - "Product"
    gap_severity_if_missing: nice-to-have
    note: "Critical for AI-heavy products; advisory for standard projects"

