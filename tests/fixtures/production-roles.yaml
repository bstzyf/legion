# Coverage Analysis Summary
coverage_summary:
  total_roles: 18
  by_priority:
    critical: 6
    important: 9
    nice-to-have: 3
  by_category:
    sre-devops: 4
    security: 4
    data-ai: 4
    engineering: 4
    operations: 3
  expected_gaps:
    - role: security-engineer
      reason: "Referenced in intent-teams.yaml but no dedicated agent"
      impact: "OWASP/STRIDE expertise missing"
    - role: data-scientist
      reason: "No formal statistical modeling agent"
      impact: "Advanced analytics capabilities limited"
    - role: penetration-tester
      reason: "Intentionally excluded for cost optimization"
      impact: "Minimal - covered by security reviews"
    - role: product-technical-writer
