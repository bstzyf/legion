# Roster Gap Analysis Configuration
# Version: 1.0
# Description: Gap analysis settings for identifying coverage gaps in the agent roster
# Requirements: ROSTER-01, ROSTER-02, ROSTER-03, ROSTER-04, ROSTER-06

---
gap_analysis:
  version: "1.0"
  agent_limit: 52
  
  # Production role categories to analyze
  # Each category maps production-grade roles to current agent coverage
  role_categories:
    sre_devops:
      priority: critical
      description: "Site Reliability Engineering and DevOps capabilities"
      roles:
        sre_reliability_engineer:
          description: "Formal SRE with SLOs, error budgets, and reliability focus"
          required_capabilities:
            - slo_management
            - error_budgets
            - incident_response
            - reliability_engineering
          coverage_indicators:
            - support-infrastructure-maintainer
            - engineering-devops-automator
            
        chaos_engineer:
          description: "Chaos engineering and failure injection testing"
          required_capabilities:
            - chaos_experiments
            - failure_injection
            - resilience_testing
            - game_days
          coverage_indicators:
            - testing-performance-benchmarker
            
        platform_engineer:
          description: "Internal developer platform and tooling"
          required_capabilities:
            - developer_platforms
            - internal_tooling
            - self_service_infrastructure
          coverage_indicators:
            - engineering-devops-automator
            
        observability_engineer:
          description: "Monitoring, logging, tracing, and observability"
          required_capabilities:
            - distributed_tracing
            - metrics_collection
            - log_aggregation
            - alerting_systems
          coverage_indicators:
            - support-infrastructure-maintainer
            - data-analytics-reporter
      
    security:
      priority: critical
      description: "Security engineering and compliance capabilities"
      roles:
        security_engineer:
          description: "Dedicated security engineer with OWASP/STRIDE expertise"
          required_capabilities:
            - owasp_top_10
            - stride_threat_modeling
            - secure_code_review
            - vulnerability_assessment
          coverage_indicators:
            - engineering-security-engineer
            
        compliance_auditor:
          description: "Compliance and regulatory audit capabilities"
          required_capabilities:
            - regulatory_compliance
            - audit_preparation
            - policy_enforcement
            - risk_assessment
          coverage_indicators:
            - support-legal-compliance-checker
            
        penetration_tester:
          description: "Penetration testing and security validation"
          required_capabilities:
            - penetration_testing
            - exploit_development
            - red_team_operations
          coverage_indicators:
            - testing-api-tester
            
        pii_specialist:
          description: "PII protection and data privacy specialist"
          required_capabilities:
            - data_privacy
            - pii_detection
            - gdpr_compliance
            - data_classification
          coverage_indicators:
            - support-legal-compliance-checker
        
    data_ai:
      priority: important
      description: "Data science, ML, and AI capabilities"
      roles:
        data_scientist:
          description: "Statistical modeling, experimental design, and data analysis"
          required_capabilities:
            - statistical_modeling
            - hypothesis_testing
            - experimental_design
            - data_visualization
          coverage_indicators:
            - data-analytics-reporter
            
        ml_engineer:
          description: "Machine learning model development and deployment"
          required_capabilities:
            - ml_model_training
            - model_deployment
            - feature_engineering
            - ml_ops
          coverage_indicators:
            - engineering-ai-engineer
            
        data_engineer:
          description: "Data pipeline engineering and infrastructure"
          required_capabilities:
            - etl_pipelines
            - data_warehousing
            - data_quality
            - data_governance
          coverage_indicators:
            - data-analytics-reporter
        
    engineering:
      priority: important
      description: "Core software engineering capabilities"
      roles:
        senior_developer:
          description: "Senior-level full-stack development"
          required_capabilities:
            - architecture_design
            - code_review
            - mentoring
            - technical_leadership
          coverage_indicators:
            - engineering-senior-developer
            
        backend_architect:
          description: "Backend system architecture and API design"
          required_capabilities:
            - api_design
            - database_architecture
            - microservices
            - distributed_systems
          coverage_indicators:
            - engineering-backend-architect
            
        frontend_specialist:
          description: "Advanced frontend development and architecture"
          required_capabilities:
            - component_architecture
            - state_management
            - performance_optimization
            - accessibility
          coverage_indicators:
            - engineering-frontend-developer
        
    operations:
      priority: nice_to_have
      description: "Operational support and maintenance capabilities"
      roles:
        incident_responder:
          description: "24/7 incident response and on-call management"
          required_capabilities:
            - incident_management
            - on_call_rotation
            - war_room_coordination
            - post_mortems
          coverage_indicators:
            - support-infrastructure-maintainer
            
        runbook_maintainer:
          description: "Operational runbook and procedure documentation"
          required_capabilities:
            - runbook_authoring
            - procedure_documentation
            - operational_readiness
            - knowledge_base
          coverage_indicators:
            - project-management-studio-operations

  # Coverage scoring weights
  # These define how coverage strength translates to numerical scores
  scoring:
    full_coverage: 1.0
    partial_coverage: 0.5
    minimal_coverage: 0.2
    no_coverage: 0.0
    
    # Coverage calculation weights for composite scoring
    weight_by_role_count:
      # When multiple agents cover a role, apply diminishing returns
      single_agent: 1.0
      two_agents: 1.2
      three_or_more: 1.3
      
  # Gap severity thresholds
  # Maps calculated gap scores to severity classifications
  severity:
    critical:
      min_gap_score: 0.8
      description: "Blocks production use, immediate attention required"
      color: "#FF0000"
      action: "MUST address in current phase"
      
    high:
      min_gap_score: 0.5
      description: "Significant impact on production readiness"
      color: "#FF6600"
      action: "SHOULD address in current phase"
      
    medium:
      min_gap_score: 0.3
      description: "Moderate impact, address in next milestone"
      color: "#FFCC00"
      action: "Address in v5.1 or v6.0"
      
    low:
      min_gap_score: 0.0
      description: "Nice to have, address when convenient"
      color: "#009900"
      action: "Address as time permits"

  # Intent teams to validate
  # These are checked for orphaned references (agents that don't exist)
  intent_teams_to_check:
    harden:
      description: "Security audit with Testing + Security divisions"
      required_agents:
        - testing-reality-checker
        - engineering-security-engineer
        - testing-api-tester
        - testing-evidence-collector
        
    document:
      description: "Documentation generation"
      required_agents:
        - product-technical-writer
        - engineering-frontend-developer
        
    security-only:
      description: "Security-only review audit"
      required_agents:
        - engineering-security-engineer
        - testing-api-tester
        
  # Agent replacement candidates (for 52-agent limit)
  # Agents that could be consolidated or removed if needed
  replacement_candidates:
    low_usage:
      - agent_id: marketing-tiktok-strategist
        reason: "Very niche platform, limited applicability"
        replacement_difficulty: low
        
      - agent_id: marketing-reddit-community-builder
        reason: "Niche platform, can be covered by general social strategist"
        replacement_difficulty: low
        
    overlapping:
      - agent_id: support-analytics-reporter
        overlaps_with: data-analytics-reporter
        reason: "Post-analysis delivery overlaps with data-analytics-reporter pre-analysis work"
        consolidation_benefit: "Unified analytics pipeline"
        
      - agent_id: testing-tool-evaluator
        reason: "Testing-specific, lower priority than core QA agents"
        replacement_difficulty: medium
        
    candidates_for_consolidation:
      - pair:
          - support-analytics-reporter
          - data-analytics-reporter
        proposed_name: data-analytics-specialist
        rationale: "Single agent handling full analytics lifecycle"
        
  # Current gap findings (populated by analysis)
  # These are updated by the gap analysis engine
  current_gaps:
    missing_referenced_agents:
      - agent_id: engineering-security-engineer
        referenced_in:
          - harden intent
          - security-only intent
        severity: critical
        impact: "harden intent cannot function as designed"
        
      - agent_id: product-technical-writer
        referenced_in:
          - document intent
        severity: high
        impact: "document intent uses suboptimal fallback"
        
    coverage_gaps:
      - role: sre_reliability_engineer
        current_coverage: partial
        covering_agents:
          - support-infrastructure-maintainer
          - engineering-devops-automator
        gaps:
          - formal SLO management
          - chaos engineering
          - runbook automation
        severity: medium
        
      - role: security_engineer
        current_coverage: minimal
        covering_agents:
          - testing-api-tester
        gaps:
          - OWASP Top 10 comprehensive audit
          - STRIDE threat modeling
          - secure code review
          - PII compliance checking
        severity: high
        
      - role: data_scientist
        current_coverage: partial
        covering_agents:
          - data-analytics-reporter
          - engineering-ai-engineer
        gaps:
          - statistical modeling
          - hypothesis testing
          - experimental design
          - A/B test analysis
        severity: medium

  # Configuration for gap report generation
  report_generation:
    include_agent_inventory: true
    include_coverage_matrix: true
    include_recommendations: true
    include_limit_analysis: true
    severity_order: [critical, high, medium, low]
    
  # Integration points
  integrations:
    catalog_file: "skills/agent-registry/CATALOG.md"
    intent_teams_file: ".planning/config/intent-teams.yaml"
    output_directory: ".planning/phases/40-roster-gap-analysis"
