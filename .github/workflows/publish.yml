name: Publish to npm and GitHub Packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (e.g. latest, next, beta)'
        required: false
        default: 'latest'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node (npm registry)
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for provenance publishing
        run: npx -y npm@latest install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run validate

      - name: Check release consistency
        run: npm run release:check

      - name: Verify checksums file is current
        run: |
          npm run checksums:generate
          git diff --exit-code -- checksums.sha256

      - name: Run tests
        run: npm test

      - name: Pack (dry run)
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public --provenance --tag ${{ github.event.inputs.tag }}

      - name: Setup Node (GitHub Packages registry)
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@9thlevelsoftware'

      - name: Publish to GitHub Packages
        run: npm publish --tag ${{ github.event.inputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
