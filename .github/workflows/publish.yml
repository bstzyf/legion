name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (e.g. latest, next, beta)'
        required: false
        default: 'latest'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run validate

      - name: Check release consistency
        run: npm run release:check

      - name: Verify checksums file is current
        run: |
          npm run checksums:generate
          git diff --exit-code -- checksums.sha256

      - name: Run tests
        run: npm test

      - name: Pack (dry run)
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public --provenance --tag ${{ github.event.inputs.tag }}
