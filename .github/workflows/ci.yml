name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate
        run: npm run validate

      - name: Check release consistency
        run: npm run release:check

      - name: Verify checksums file is current
        run: |
          npm run checksums:generate
          git diff --exit-code -- checksums.sha256

      - name: Run tests
        run: npm test
